<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <title>Nepřeplácejme.cz</title>
    <script type="text/javascript">
      // SPA fallback for GitHub Pages:
      // Uloží původní URL do sessionStorage a přesměruje na root.
      // App.tsx pak v useEffect provede history.replaceState na uloženou cestu,
      // takže React Router obslouží správnou podstránku (např. /blog/<slug>).
      sessionStorage.redirect = location.href;
    </script>
    <meta http-equiv="refresh" content="0;URL='/'">
  </head>
  <body>
    Přesměrovávám…
  </body>
</html>
